<main class="page-shell">
  <section class="lists-panel">
    <header class="card-header">
      <p class="eyebrow">Collections</p>
      <h1>Lists</h1>
      <p class="subtitle">Create, title, and delete each list.</p>
    </header>

    <form class="create-form" (ngSubmit)="createList()">
      <input
        name="newListTitle"
        [ngModel]="newListTitle()"
        (ngModelChange)="newListTitle.set($event)"
        placeholder="New list title"
        autocomplete="off"
      />
      <button type="submit">Create</button>
    </form>

    <ul class="list-navigation">
      @for (list of store.lists(); track list.id) {
        <li class="list-row" [class.selected]="store.selectedListId() === list.id">
          <button type="button" class="list-name" (click)="navigateToList(list.id)">{{ list.title }}</button>
          <button type="button" class="ghost" (click)="deleteList(list.id)">Delete</button>
        </li>
      } @empty {
        <li class="empty-state">No lists yet.</li>
      }
    </ul>
  </section>

  <section class="todo-card">
    @if (store.error()) {
      <p class="message error">{{ store.error() }}</p>
    }

    @if (store.loading()) {
      <p class="message">Working...</p>
    }

    <router-outlet></router-outlet>
  </section>
</main>
